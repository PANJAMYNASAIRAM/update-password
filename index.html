<!DOCTYPE html>
<html>

<head>
    <!-- Bootstrap -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">

    <!-- ✅ Your CSS File -->
    <link rel="stylesheet" href="styles.css">
</head>


<body>
    <div class="bg-container">
        <div>
            <h1 class="head">Update Password</h1>
        </div>
        <form id="updatePasswordForm">
            <div class="inputone">
                <label for="newPassword" class="paraone">NEW PASSWORD</label>
                <div>
                    <input id="newPassword" type="password" class="intone" placeholder="Create new Password" />
                    <p id="newPasswordErrMsg"></p>
                </div>
            </div>
            <div class="inputone">
                <label for="confirmPassword" class="paraone">CONFIRM PASSWORD</label>
                <div>
                    <input id="confirmPassword" type="password" class="intone" placeholder="Confirm password" />
                    <p id="confirmPasswordErrMsg"></p>
                </div>
            </div>
            <div class="but">
                <button id="updateBtn" class="bg-primary butTwo">Update</button>
                <p id="warn"></p>
            </div>
        </form>
    </div> 
        <script src="script.js"></script> 
</body>

</html>
